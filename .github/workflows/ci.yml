name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.labels.*.name, ','), '') ||
      true
    steps:
      - uses: actions/checkout@v4

      - name: Check backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'app/**'
              - 'ml/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'infra/**'
              - 'scripts/**'

      - name: Install uv
        if: steps.changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        if: steps.changes.outputs.backend == 'true'
        run: uv python install 3.12

      - name: Install dependencies
        if: steps.changes.outputs.backend == 'true'
        run: uv sync

      - name: Lint (ruff)
        if: steps.changes.outputs.backend == 'true'
        run: uv run ruff check app/ ml/

      - name: Format check (ruff)
        if: steps.changes.outputs.backend == 'true'
        run: uv run ruff format --check app/ ml/

      - name: Docker build test
        if: steps.changes.outputs.backend == 'true'
        run: |
          docker build -f infra/docker/Dockerfile.core -t agriscore-core:test .
          docker build -f infra/docker/Dockerfile.api-rest -t agriscore-api-rest:test .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check frontend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'

      - name: Setup Node
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci

      - name: Lint
        if: steps.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run lint

      - name: Build
        if: steps.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run build
