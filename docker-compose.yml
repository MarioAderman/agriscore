services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: agriscore
      POSTGRES_PASSWORD: agriscore
      POSTGRES_DB: agriscore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriscore"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://agriscore:agriscore@db:5432/agriscore
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./ml:/app/ml

  evolution:
    image: atendai/evolution-api:v2.2.3
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-demo-key}
      SERVER_URL: http://localhost:8080
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://agriscore:agriscore@db:5432/agriscore
      WEBHOOK_GLOBAL_URL: http://api:8000/api/webhook/whatsapp
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
